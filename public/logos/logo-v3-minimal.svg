<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ultra-minimal: Rising A with line -->
  <rect width="200" height="200" fill="#0a0a0a"/>
  <!-- The A as upward arrow / mountain -->
  <path d="M50 160L100 40L150 160" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar -->
  <line x1="68" y1="120" x2="132" y2="120" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
  <!-- Thin accent line below -->
  <line x1="80" y1="175" x2="120" y2="175" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
</svg>
